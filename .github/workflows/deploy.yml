name: Deploy status bot

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nz-tg-status-bot-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 72.56.116.237
      VPS_USER: root
      VPS_PORT: 22
      VPS_APP_DIR: /opt/nz_tg_status_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        run: |
          required=(
            VPS_SSH_KEY
          )
          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::notice::Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "DEPLOY_READY=false" >> "$GITHUB_ENV"
            echo "::notice::Deployment skipped until GitHub Actions secrets are configured."
          else
            echo "DEPLOY_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Add SSH key
        if: env.DEPLOY_READY == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        if: env.DEPLOY_READY == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project
        if: env.DEPLOY_READY == 'true'
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude 'logs' \
            -e "ssh -p $VPS_PORT" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Check remote environment
        if: env.DEPLOY_READY == 'true'
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "test -f '$VPS_APP_DIR/.env'"

      - name: Deploy compose project
        if: env.DEPLOY_READY == 'true'
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$VPS_APP_DIR' && if docker compose version >/dev/null 2>&1; then docker compose -p nz_tg_status_bot up -d --build --remove-orphans; elif command -v docker-compose >/dev/null 2>&1; then docker-compose -p nz_tg_status_bot up -d --build --remove-orphans; else set -a; . ./.env; set +a; docker build -t nz_tg_status_bot:latest .; docker rm -f nz_tg_status_bot >/dev/null 2>&1 || true; docker run -d --name nz_tg_status_bot --restart unless-stopped --add-host host.docker.internal:host-gateway --env-file .env -v '$VPS_APP_DIR/data:/app/data' -v '$VPS_APP_DIR/logs:/app/logs' -v \"\${INCUBATOR_DATABASE_HOST_PATH:-$VPS_APP_DIR/data/missing-incubator.db}:\${INCUBATOR_DATABASE_CONTAINER_PATH:-/external/incubator.db}:ro\" nz_tg_status_bot:latest; fi"
