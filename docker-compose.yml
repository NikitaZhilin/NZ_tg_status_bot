name: nz_tg_status_bot

services:
  status-bot:
    build: .
    container_name: nz_tg_status_bot
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rememberme_bot_network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ${INCUBATOR_DATABASE_HOST_PATH:-./data/missing-incubator.db}:${INCUBATOR_DATABASE_CONTAINER_PATH:-/external/incubator.db}:ro
      - ${REMEMBERME_BACKUP_HOST_PATH:-./data/missing-rememberme-backups}:/external/backups/rememberme:ro
      - ${INCUBATOR_BACKUP_HOST_PATH:-./data/missing-incubator-backups}:/external/backups/incubator:ro
      - ${REMEMBERME_LOG_HOST_PATH:-./data/missing-rememberme-logs}:/external/logs/rememberme:ro
      - ${INCUBATOR_LOG_HOST_PATH:-./data/missing-incubator-logs}:/external/logs/incubator:ro
    environment:
      INCUBATOR_DATABASE_PATH: ${INCUBATOR_DATABASE_CONTAINER_PATH:-/external/incubator.db}
      STATUS_DB_PATH: /app/data/status_bot.db
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; p=os.getenv('STATUS_DB_PATH','/app/data/status_bot.db'); sqlite3.connect(p).execute('select 1').fetchone()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  rememberme_bot_network:
    external: true
